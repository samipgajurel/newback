services:
  mysql:
    image: mysql:8.0
    container_name: newback_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass123}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 30

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: backup_20-web
    container_name: newback_web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health/ | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 30

  nginx:
    image: nginx:alpine
    container_name: newback_nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "8080:80"
    # volumes:
    #   # ✅ IMPORTANT: make sure this file exists EXACTLY
    #   - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    #   # ✅ frontend static
    #   - ./frontend:/usr/share/nginx/html:ro

volumes:
  mysql_data: