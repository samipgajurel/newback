<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Codavatar InternTrack - Login</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="brand">
        <div>
          <h1>Codavatar InternTrack</h1>
          <small>Login to continue</small>
        </div>
        <button class="toggle" type="button" id="themeBtn">🌙/☀️</button>
      </div>

      <div id="msg" class="msg" style="display:none;"></div>

      <form id="form" class="form" autocomplete="on">
        <div class="field">
          <label>Email</label>
          <input id="email" type="email" required />
        </div>

        <div class="field">
          <label>Password</label>
          <div class="input-row">
            <input id="password" type="password" required />
            <button class="eye-btn" type="button" id="pwToggleBtn">Show</button>
          </div>
        </div>

        <button id="loginBtn" class="btn" type="button">Login</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>

  <script>
    // theme
    function applyTheme(t){ document.documentElement.setAttribute("data-theme", t); localStorage.setItem("theme", t); }
    function initTheme(){ applyTheme(localStorage.getItem("theme") || "light"); }
    document.getElementById("themeBtn").onclick = () => {
      const cur = document.documentElement.getAttribute("data-theme") || "light";
      applyTheme(cur === "light" ? "dark" : "light");
    };
    initTheme();

    const msg = document.getElementById("msg");
    const emailEl = document.getElementById("email");
    const passEl = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");

    function showMsg(text, ok=false){
      msg.style.display="block";
      msg.className = "msg " + (ok ? "ok" : "err");
      msg.textContent = text;
    }
    function hideMsg(){ msg.style.display="none"; msg.textContent=""; }

    document.getElementById("pwToggleBtn").onclick = () => {
      passEl.type = (passEl.type === "password") ? "text" : "password";
    };

    async function doLogin(){
      hideMsg();
      loginBtn.disabled = true;

      const email = emailEl.value.trim().toLowerCase();
      const password = passEl.value;

      try{
        const res = await apiFetch("/token/", {
          method:"POST",
          body: JSON.stringify({ email, password })
        });

        const data = await res.json().catch(()=> ({}));
        if(!res.ok){
          showMsg(data.detail || ("Login failed ("+res.status+")"));
          loginBtn.disabled=false;
          return;
        }

        localStorage.setItem("access", data.access);
        localStorage.setItem("refresh", data.refresh);

        const meRes = await apiFetch("/accounts/me/");
        const me = await meRes.json().catch(()=> ({}));
        localStorage.setItem("user", JSON.stringify(me));

        window.location.href="/dashboard.html";
      }catch(e){
        console.error(e);
        showMsg("Server not reachable");
      }

      loginBtn.disabled=false;
    }

    loginBtn.onclick = doLogin;
    document.getElementById("form").addEventListener("keydown",(e)=>{
      if(e.key==="Enter"){ e.preventDefault(); doLogin(); }
    });
  </script>
</body>
</html>
